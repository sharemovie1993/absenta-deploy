services:
  redis:
    image: redis:7-alpine
    container_name: absenta-redis
    ports:
      - "6379:6379"

  backend-api:
    build:
      context: ../../ProjekAbsenta/backend/absenta_backend
      dockerfile: Dockerfile
    image: absenta-backend:latest
    container_name: absenta-backend-api
    env_file:
      - ./env.common
    environment:
      - NODE_NAME=node-api
      - EMBEDDED_WORKERS=false
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL}
      # Set DATABASE_URL via .env or override when running
    depends_on:
      - redis
    ports:
      - "3001:3001"

  # Node API side workers
  worker-infra:
    image: absenta-backend:latest
    container_name: absenta-worker-infra
    env_file:
      - ./env.common
    environment:
      - NODE_NAME=node-api
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    command: ["node","dist/workers/infra.worker.js"]
    depends_on:
      - redis

  worker-agent:
    image: absenta-backend:latest
    container_name: absenta-worker-agent
    env_file:
      - ./env.common
    environment:
      - NODE_NAME=node-api
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    command: ["node","dist/infra/workerAgent.js"]
    depends_on:
      - redis

  # Node Billing (server 2) workers
  worker-billing:
    image: absenta-backend:latest
    container_name: absenta-worker-billing
    env_file:
      - ./env.common
    environment:
      - NODE_NAME=node-billing
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    command: ["node","dist/workers/billing.worker.js"]
    depends_on:
      - redis

  worker-notification:
    image: absenta-backend:latest
    container_name: absenta-worker-notification
    env_file:
      - ./env.common
    environment:
      - NODE_NAME=node-billing
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    command: ["node","dist/workers/notification.worker.js"]
    depends_on:
      - redis

  # Node Attendance (server 3) workers
  worker-attendance:
    image: absenta-backend:latest
    container_name: absenta-worker-attendance
    env_file:
      - ./env.common
    environment:
      - NODE_NAME=node-attendance
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    command: ["node","dist/workers/attendance.worker.js"]
    depends_on:
      - redis

  worker-analytics:
    image: absenta-backend:latest
    container_name: absenta-worker-analytics
    env_file:
      - ./env.common
    environment:
      - NODE_NAME=node-attendance
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    command: ["node","dist/workers/analytics.worker.js"]
    depends_on:
      - redis

  worker-maintenance:
    image: absenta-backend:latest
    container_name: absenta-worker-maintenance
    env_file:
      - ./env.common
    environment:
      - NODE_NAME=node-attendance
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    command: ["node","dist/workers/maintenance.worker.js"]
    depends_on:
      - redis

networks:
  default:
    name: absenta-net
