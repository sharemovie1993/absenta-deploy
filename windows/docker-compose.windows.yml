services:
  redis:
    image: redis:7-alpine
    container_name: absenta-redis
    ports:
      - "6379:6379"

  backend-api:
    build:
      context: ../../ProjekAbsenta/backend/absenta_backend
      dockerfile: Dockerfile
    image: absenta-backend:latest
    container_name: absenta-backend-api
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.payment
      - ../env/env.email
      - ../env/env.production
    environment:
      - NODE_NAME=node-api
      - EMBEDDED_WORKERS=false
      - PM2_DISABLED=true
      - MAIN_DOMAIN=${MAIN_DOMAIN:-}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL:-}
      # Set DATABASE_URL via .env or override when running
    depends_on:
      - redis
    ports:
      - "3001:3001"

  # Node API side workers
  worker-infra:
    image: absenta-backend:latest
    container_name: absenta-worker-infra
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-api
      - MAIN_DOMAIN=${MAIN_DOMAIN:-}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL:-}
    command: ["node","dist/workers/infra.worker.js"]
    depends_on:
      - redis

  # Node Billing (server 2) workers
  worker-billing:
    image: absenta-backend:latest
    container_name: absenta-worker-billing
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-billing
      - MAIN_DOMAIN=${MAIN_DOMAIN:-}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL:-}
    command: ["node","dist/workers/billing.worker.js"]
    depends_on:
      - redis

  worker-notification:
    image: absenta-backend:latest
    container_name: absenta-worker-notification
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-billing
      - MAIN_DOMAIN=${MAIN_DOMAIN:-}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL:-}
    command: ["node","dist/workers/notification.worker.js"]
    depends_on:
      - redis

  # Node Attendance (server 3) workers
  worker-attendance:
    image: absenta-backend:latest
    container_name: absenta-worker-attendance
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-attendance
      - MAIN_DOMAIN=${MAIN_DOMAIN:-}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL:-}
    command: ["node","dist/workers/attendance.worker.js"]
    depends_on:
      - redis

  worker-analytics:
    image: absenta-backend:latest
    container_name: absenta-worker-analytics
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-attendance
      - MAIN_DOMAIN=${MAIN_DOMAIN:-}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL:-}
    command: ["node","dist/workers/analytics.worker.js"]
    depends_on:
      - redis

  worker-maintenance:
    image: absenta-backend:latest
    container_name: absenta-worker-maintenance
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-attendance
      - MAIN_DOMAIN=${MAIN_DOMAIN:-}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL:-}
    command: ["node","dist/workers/maintenance.worker.js"]
    depends_on:
      - redis

  worker-agent:
    image: absenta-backend:latest
    container_name: absenta-worker-agent
    env_file:
      - ../env/env.common
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=worker-agent
      - AGENT_HANDLE_ALL_NODES=true
      - AGENT_MAX_INSTANCES=10
      - MAIN_DOMAIN=${MAIN_DOMAIN:-}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      - PUBLIC_INVOICE_BASE_URL=${PUBLIC_INVOICE_BASE_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["node","dist/infra/control-agent.js"]
    depends_on:
      - redis

  worker-attendance-2:
    image: absenta-backend:latest
    container_name: absenta-worker-attendance-2
    profiles: ["templates"]
    restart: "no"
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-attendance
    command: ["node","dist/workers/attendance.worker.js"]
    depends_on:
      - redis

  worker-attendance-3:
    image: absenta-backend:latest
    container_name: absenta-worker-attendance-3
    profiles: ["templates"]
    restart: "no"
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-attendance
    command: ["node","dist/workers/attendance.worker.js"]
    depends_on:
      - redis

  worker-billing-2:
    image: absenta-backend:latest
    container_name: absenta-worker-billing-2
    profiles: ["templates"]
    restart: "no"
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-billing
    command: ["node","dist/workers/billing.worker.js"]
    depends_on:
      - redis

  worker-notification-2:
    image: absenta-backend:latest
    container_name: absenta-worker-notification-2
    profiles: ["templates"]
    restart: "no"
    env_file:
      - ../env/env.common
      - ../env/env.database
      - ../env/env.redis
      - ../env/env.production
    environment:
      - NODE_NAME=node-billing
    command: ["node","dist/workers/notification.worker.js"]
    depends_on:
      - redis

networks:
  default:
    name: absenta-net
